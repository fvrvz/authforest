services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_USER: test # <-- change this
      DB_PASSWORD: test # <-- change this
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: auth-service-go
      JWT_SECRET: "any-random-value-1234" # <-- change this

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test # <-- change this
      POSTGRES_PASSWORD: test # <-- change this
      POSTGRES_DB: auth-service-go
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

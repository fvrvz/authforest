name: authforest

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: test # <-- change this
      DB_PASSWORD: test # <-- change this
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: authforest
      DB_SSLMODE: disable
      DB_CHANNEL_BINDING: disable
      JWT_SECRET: "any-random-value-1234" # <-- change this
      OIDC_ISSUER: "http://localhost:8080" # <-- change this to your domain
      RSA_KEY_PATH: /data/rsa_private.pem
    volumes:
      - app_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test # <-- change this
      POSTGRES_PASSWORD: test # <-- change this
      POSTGRES_DB: authforest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d authforest"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  app_data:

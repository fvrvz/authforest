run:
  timeout: 5m
  tests: true

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/fvrvz/authforest
  govet:
    enable:
      - shadow
  revive:
    severity: warning
  staticcheck:
    checks: ["all"]

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - revive
  disable-all: true

issues:
  exclude-use-default: true
  max-issues-per-linter: 50
  max-same-issues: 3

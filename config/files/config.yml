server:
  port: 8080
  cors:
    allowOrigins:
      - http://localhost:5173
      - https://fvrvz.github.io
    allowCredentials: true
    maxAge: 24
    allowMethods:
      - GET
      - POST
      - DELETE
      - OPTIONS
      - HEAD
      - PATCH
    allowHeaders:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - X-Requested-With

database:
  host: ${DB_HOST}
  port: ${DB_PORT}
  username: ${DB_USER}
  password: ${DB_PASSWORD}
  db: ${DB_NAME}
  sslmode: ${DB_SSLMODE}
  time_zone: UTC
  channel_binding: ${DB_CHANNEL_BINDING}

jwt:
  expiry_minutes: 15
  jwt_secret: ${JWT_SECRET}
  refresh_token_expiry_hours: 2

oidc:
  issuer: ${OIDC_ISSUER}
  rsa_key_path: ${RSA_KEY_PATH:-rsa_private.pem}

smtp:
  host: ${SMTP_HOST:-localhost}
  port: ${SMTP_PORT:-587}
  username: ${SMTP_USERNAME}
  password: ${SMTP_PASSWORD}
  from: ${SMTP_FROM:-noreply@localhost}
